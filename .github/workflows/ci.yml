name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The matrix is what makes `requires-python = ">=3.10"` a tested claim
        # rather than an assertion.
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install the deterministic layer
        # pyright and semgrep are what the acceptance suite exercises. semgrep has
        # no Windows wheel, which is one reason this job is ubuntu-only.
        run: pip install pyright semgrep

      - name: Lint
        run: ruff check cca_checks tests

      - name: Test
        run: pytest -q

  package:
    # A wheel that imports at the repo root but not once installed is a failure
    # mode the test job cannot see: tests run against the source tree, so a module
    # or data file missing from the wheel stays invisible until a user installs it.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Build the wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Install the built wheel into a clean venv and smoke-test it
        run: |
          python -m venv /tmp/wheeltest
          /tmp/wheeltest/bin/pip install --quiet dist/*.whl
          # CLI entry point resolves
          /tmp/wheeltest/bin/python -m cca_checks --help
          # Bundled rule files actually shipped and are reachable through
          # importlib.resources, not just present in the source tree.
          /tmp/wheeltest/bin/python - <<'PY'
          import os
          from cca_checks.semgrep_check import SINKS_RULES, TAINT_RULES, rules_path
          for name in (SINKS_RULES, TAINT_RULES):
              path = rules_path(name)
              assert os.path.exists(path), f"rule file missing from the wheel: {name}"
          print("packaged rules OK")
          PY

      - name: Install the plugin from the wheel into a scratch project
        # The agent/command markdown IS the product, and a wheel that omits it
        # still installs, still imports, and `cca-audit install` still exits 0 --
        # leaving an empty .claude/. Only running the console script against a
        # real directory and counting what landed catches that, which is why
        # this asserts on files rather than on the exit code.
        run: |
          mkdir -p /tmp/scratch-project
          cd /tmp/scratch-project
          /tmp/wheeltest/bin/cca-audit install
          # Every agent that ships in the source tree must arrive. A package-data
          # glob that silently stops matching would otherwise install a partial
          # auditor set -- findings would just quietly stop being raised.
          expected=$(ls "$GITHUB_WORKSPACE"/cca_checks/plugin/agents/cca-*.md | wc -l)
          actual=$(ls .claude/agents/cca-*.md | wc -l)
          test "$expected" -eq "$actual" || { echo "wheel shipped $actual of $expected agents"; exit 1; }
          test -n "$(ls .claude/commands/audit-fix*.md)" || { echo "no commands installed"; exit 1; }
          echo "plugin install OK ($actual agents)"
