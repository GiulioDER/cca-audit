# CCA-Audit Configuration
# Copy to cca-audit.yaml in your project root

# OpenRouter API key (or set OPENROUTER_API_KEY env var)
# api_key: your-key-here

# Model to use (default: anthropic/claude-sonnet-4-20250514)
# See https://openrouter.ai/models for options
model: anthropic/claude-sonnet-4-20250514

# Max tokens per auditor response
max_tokens: 8192

# Temperature (0.0 = deterministic)
temperature: 0.0

# Which auditors to run (default: all)
auditors:
  - code
  - bug
  - security
  - perf
  - doc
  - env
  - dep

# Output directory for reports
output_dir: .claude/audits

# Output format: markdown or json
output_format: markdown

# Max REVISE iterations before escalating to user
max_revise_iterations: 3

# Project-specific context (injected into all auditor prompts)
# project_context: "This is an e-commerce platform. Prioritize data integrity and auth."
